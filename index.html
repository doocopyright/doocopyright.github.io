<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOO Media – News Magazine</title>
    
    <!-- ===== COPYRIGHT PROTECTION META ===== -->
    <meta name="copyright" content="DOO Media - All Rights Reserved" />
    <meta name="author" content="DOO MEDIA GROUP" />
    <meta name="robots" content="index, follow" />
    <meta name="rating" content="general" />
    <meta name="distribution" content="global" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
           ANIMATIONS
           ============================================================ */
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(139, 164, 217, 0.2);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 40px rgba(139, 164, 217, 0.5);
                transform: scale(1.02);
            }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        @keyframes ripple {
            from { width: 0; height: 0; opacity: 0.6; }
            to { width: 300px; height: 300px; opacity: 0; }
        }
        
        /* ============================================================
           ANIMATION CLASSES
           ============================================================ */
        .animate-fadeInDown { animation: fadeInDown 0.6s ease forwards; }
        .animate-fadeInUp { animation: fadeInUp 0.6s ease forwards; }
        .animate-fadeIn { animation: fadeIn 0.5s ease forwards; }
        .animate-fadeInLeft { animation: fadeInLeft 0.6s ease forwards; }
        .animate-fadeInRight { animation: fadeInRight 0.6s ease forwards; }
        .animate-scaleIn { animation: scaleIn 0.5s ease forwards; }
        .animate-pulseGlow { animation: pulseGlow 2s ease-in-out infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
        .delay-6 { animation-delay: 0.6s; }
        
        /* ============================================================
           RESET & BASE
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #ffffff;
            color: #555;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        a {
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease;
        }
        
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* ============================================================
           RIPPLE EFFECT
           ============================================================ */
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(139, 164, 217, 0.3);
            transform: scale(0);
            animation: ripple 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 999;
        }
        
        /* ============================================================
           X LOGO STYLES
           ============================================================ */
        .x-logo {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            vertical-align: middle;
            object-fit: cover;
            transition: transform 0.3s ease, filter 0.3s ease;
        }
        
        .x-logo:hover {
            transform: scale(1.15) rotate(-5deg);
            filter: brightness(1.1);
        }
        
        .x-logo-large {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
            transition: transform 0.3s ease, filter 0.3s ease;
        }
        
        .x-logo-large:hover {
            transform: scale(1.15) rotate(-5deg);
            filter: brightness(1.1);
        }
        
        /* ============================================================
           HEADER
           ============================================================ */
        .site-header {
            background: linear-gradient(135deg, #0d0f1a 0%, #1a1d30 100%);
            color: #fff;
            padding: 20px 0;
            border-bottom: 3px solid #8ba4d9;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .site-header.scrolled {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        
        .site-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139,164,217,0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }
        
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            position: relative;
            z-index: 1;
        }
        
        .logo {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        
        .logo-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8ba4d9, #5a7cb8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #0d0f1a;
            font-family: 'Merriweather', serif;
            box-shadow: 0 4px 15px rgba(139,164,217,0.3);
            flex-shrink: 0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: pulseGlow 3s ease-in-out infinite;
        }
        
        .logo-icon:hover {
            transform: scale(1.1) rotate(-5deg);
            box-shadow: 0 8px 30px rgba(139,164,217,0.5);
        }
        
        .logo-text {
            display: flex;
            flex-direction: column;
        }
        
        .logo h1 {
            font-family: 'Merriweather', Georgia, serif;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            color: #fff;
            line-height: 1.2;
        }
        
        .logo h1 span {
            color: #8ba4d9;
            transition: text-shadow 0.3s ease;
        }
        
        .logo h1:hover span {
            text-shadow: 0 0 30px rgba(139, 164, 217, 0.3);
        }
        
        .logo-slogan {
            font-size: 0.7rem;
            color: #8ba4d9;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
            opacity: 0.8;
        }
        
        .logo-slogan .sep {
            color: #4a5a7a;
            margin: 0 5px;
        }
        
        .logo .tagline {
            font-size: 0.75rem;
            color: #b0b4c8;
            font-weight: 300;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        
        .nav-links {
            display: flex;
            gap: 28px;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            flex-wrap: wrap;
        }
        
        .nav-links a {
            color: #d0d4e0;
            transition: color 0.3s ease, transform 0.3s ease;
            position: relative;
            padding-bottom: 4px;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #8ba4d9;
            transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }
        
        .nav-links a:hover {
            color: #fff;
            transform: translateY(-2px);
        }
        
        /* ===== PADDING TOP FOR FIXED HEADER ===== */
        .main-wrapper {
            padding-top: 100px;
        }
        
        /* ============================================================
           PAGE CONTAINER
           ============================================================ */
        .page-container {
            padding: 20px 0 56px;
            min-height: 60vh;
        }
        
        /* ============================================================
           LEGAL PAGES
           ============================================================ */
        .legal-page {
            display: none;
        }
        
        .legal-page.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .legal-header {
            margin-bottom: 40px;
        }
        
        .legal-header h1 {
            font-family: 'Merriweather', Georgia, serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #0d0f1a;
            margin-bottom: 8px;
        }
        
        .legal-header .legal-meta {
            color: #999;
            font-size: 0.9rem;
        }
        
        .legal-header .legal-meta span {
            margin: 0 10px;
            color: #ddd;
        }
        
        .legal-content {
            max-width: 900px;
        }
        
        .legal-content h2 {
            font-family: 'Merriweather', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #0d0f1a;
            margin-top: 36px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e5e5e5;
        }
        
        .legal-content h2:first-of-type {
            margin-top: 0;
        }
        
        .legal-content h3 {
            font-family: 'Merriweather', Georgia, serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: #2b5c9b;
            margin-top: 24px;
            margin-bottom: 10px;
        }
        
        .legal-content p {
            margin-bottom: 16px;
            color: #555;
            line-height: 1.8;
        }
        
        .legal-content ul {
            margin: 12px 0 20px 24px;
            list-style: none;
        }
        
        .legal-content ul li {
            margin-bottom: 10px;
            padding-left: 24px;
            position: relative;
            color: #555;
            line-height: 1.7;
        }
        
        .legal-content ul li::before {
            content: '◆';
            position: absolute;
            left: 0;
            color: #2b5c9b;
            font-size: 0.8rem;
        }
        
        .legal-content .highlight-box {
            background: #f9fafc;
            border-left: 4px solid #2b5c9b;
            padding: 20px 24px;
            margin: 20px 0;
            border-radius: 0 4px 4px 0;
        }
        
        .legal-content .highlight-box i {
            color: #2b5c9b;
            margin-right: 8px;
        }
        
        .legal-content .legal-date {
            color: #999;
            font-size: 0.9rem;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e5e5e5;
        }
        
        .back-to-top {
            display: inline-block;
            margin-top: 30px;
            color: #2b5c9b;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .back-to-top:hover {
            color: #1a3f6e;
            transform: translateY(-2px);
        }
        
        .back-to-top i {
            margin-right: 8px;
        }
        
        /* ============================================================
           WATERMARK
           ============================================================ */
        .card-image {
            position: relative;
            width: 100%;
            padding-bottom: 75%;
            overflow: hidden;
            background: linear-gradient(135deg, #f0f2f5 0%, #e8eaef 100%);
            margin-bottom: 18px;
            border-radius: 4px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }
        
        .card:hover .card-image {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        
        .card-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-image::after {
            content: '© DOO Media';
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 14px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 10;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        
        /* ============================================================
           DETAIL IMAGE
           ============================================================ */
        .detail-image-wrapper {
            margin-bottom: 24px;
        }
        
        .detail-image {
            width: 100%;
            background: linear-gradient(135deg, #f0f2f5 0%, #e8eaef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-radius: 4px;
            padding: 5px;
        }
        
        .detail-image img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            border-radius: 2px;
        }
        
        .detail-image::after {
            content: '© DOO Media - All Rights Reserved';
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.95);
            font-size: 14px;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 20px;
            border-radius: 6px;
            pointer-events: none;
            z-index: 10;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .detail-photo-credit {
            text-align: right;
            font-size: 0.8rem;
            color: #999;
            margin-top: 6px;
            padding-right: 4px;
            font-style: italic;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        
        .detail-photo-credit em {
            color: #888;
            font-weight: 400;
        }
        
        /* ============================================================
           ARTICLES GRID
           ============================================================ */
        .articles-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        
        .card {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            padding: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #2b5c9b, #8ba4d9, #2b5c9b);
            background-size: 200% 100%;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .card:hover::before {
            opacity: 1;
            animation: shimmer 2s linear infinite;
        }
        
        .card:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            transform: translateY(-6px);
            border-color: #8ba4d9;
        }
        
        .card-title {
            font-family: 'Merriweather', Georgia, serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: #2b5c9b;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        
        .card-title a {
            color: #2b5c9b;
            transition: color 0.3s ease;
            position: relative;
        }
        
        .card-title a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #2b5c9b;
            transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .card-title a:hover::after {
            width: 100%;
        }
        
        .card-title a:hover {
            color: #1a3f6e;
        }
        
        .card-description {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.7;
            flex: 1;
        }
        
        .card-divider {
            margin: 18px 0 0;
            border: 0;
            height: 1px;
            background: #e5e5e5;
            width: 100%;
        }
        
        /* ============================================================
           DETAIL PAGE
           ============================================================ */
        .detail-page {
            display: none;
            padding: 20px 0 60px;
        }
        
        .detail-page.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .detail-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 50px;
            align-items: start;
        }
        
        .detail-article .back-link {
            display: inline-block;
            margin-bottom: 28px;
            font-weight: 500;
            color: #2b5c9b;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .detail-article .back-link i {
            margin-right: 8px;
            transition: transform 0.3s ease;
        }
        
        .detail-article .back-link:hover {
            color: #1a3f6e;
            transform: translateX(-5px);
        }
        
        .detail-article .back-link:hover i {
            transform: translateX(-5px);
        }
        
        .detail-article .article-header h1 {
            font-family: 'Merriweather', Georgia, serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #0d0f1a;
            line-height: 1.3;
            margin-bottom: 12px;
        }
        
        .detail-article .article-meta {
            font-size: 0.9rem;
            color: #999;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        
        .detail-article .article-meta span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .detail-article .article-body {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #444;
        }
        
        .detail-article .article-body p {
            margin-bottom: 1.2rem;
        }
        
        /* ============================================================
           SIDEBAR
           ============================================================ */
        .detail-sidebar {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        
        .sidebar-block {
            background: #f9fafc;
            padding: 24px 20px;
            border: 1px solid #e5e5e5;
            transition: all 0.3s ease;
            border-radius: 4px;
        }
        
        .sidebar-block:hover {
            border-color: #8ba4d9;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }
        
        .sidebar-block h3 {
            font-family: 'Merriweather', Georgia, serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #0d0f1a;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #2b5c9b;
            display: inline-block;
            transition: border-color 0.3s ease;
        }
        
        .sidebar-block:hover h3 {
            border-color: #8ba4d9;
        }
        
        .sidebar-block .brand-desc {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.7;
        }
        
        .sidebar-block ul {
            list-style: none;
            padding: 0;
        }
        
        .sidebar-block ul li {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            transition: all 0.3s ease;
        }
        
        .sidebar-block ul li:last-child {
            border-bottom: none;
        }
        
        .sidebar-block ul li a {
            color: #2b5c9b;
            font-weight: 500;
            transition: all 0.3s ease;
            display: block;
        }
        
        .sidebar-block ul li:hover {
            padding-left: 10px;
            border-bottom-color: #8ba4d9;
        }
        
        .sidebar-block ul li:hover a {
            color: #1a3f6e;
            transform: translateX(5px);
        }
        
        /* ============================================================
           CONTACT
           ============================================================ */
        .contact-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid #e5e5e5;
        }
        
        .contact-section .section-title {
            margin-bottom: 24px;
        }
        
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }
        
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 14px;
            font-size: 1rem;
            color: #444;
        }
        
        .contact-info .item {
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s ease;
            padding: 8px 12px;
            border-radius: 8px;
        }
        
        .contact-info .item:hover {
            background: #f0f2f5;
            transform: translateX(5px);
        }
        
        .contact-info .item i {
            width: 24px;
            color: #2b5c9b;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }
        
        .contact-info .item:hover i {
            transform: scale(1.2) rotate(-10deg);
        }
        
        .contact-info .item a {
            color: #2b5c9b;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .contact-info .item a:hover {
            color: #1a3f6e;
            text-decoration: underline;
        }
